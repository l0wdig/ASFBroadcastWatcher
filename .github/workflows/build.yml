name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  
permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download latest ASF release
        run: |
          ASF_VERSION=$(curl -s https://api.github.com/repos/JustArchiNET/ArchiSteamFarm/releases/latest | jq -r '.tag_name')
          echo "ASF_VERSION=$ASF_VERSION" >> $GITHUB_ENV
          echo "Downloading ASF version: $ASF_VERSION"
          curl -L \
            --fail \
            --retry 3 \
            "https://github.com/JustArchiNET/ArchiSteamFarm/releases/download/${ASF_VERSION}/ASF-generic.zip" \
            -o /tmp/ASF.zip
          mkdir -p /tmp/ASF
          unzip -q /tmp/ASF.zip -d /tmp/ASF
          echo "Files in /tmp/ASF:"
          ls /tmp/ASF/

      - name: Copy ASF dll next to csproj
        run: |
          mkdir -p ASFBroadcastWatcher/ASFBroadcastWatcher
          cp /tmp/ASF/ArchiSteamFarm.dll ASFBroadcastWatcher/ASFBroadcastWatcher/

      - name: Build plugin
        run: |
          dotnet publish ASFBroadcastWatcher/ASFBroadcastWatcher.csproj \
            -c Release \
            -o out

      - name: Create plugin zip
        run: |
          rm -f out/ArchiSteamFarm.dll
          rm -f out/ArchiSteamFarm.pdb
          mkdir -p release/ASFBroadcastWatcher
          cp out/ASFBroadcastWatcher.dll release/ASFBroadcastWatcher/
          cd release
          zip -r ../ASFBroadcastWatcher.zip ASFBroadcastWatcher/

      - name: Get short commit SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ env.SHORT_SHA }}"
          name: "ASFBroadcastWatcher (ASF ${{ env.ASF_VERSION }})"
          body: |
            ## Installation
            1. Download `ASFBroadcastWatcher.zip`
            2. Extract into your `ASF/plugins/` folder
            3. Restart ASF

            ## Commands
            - `!BCAST <Bots> <URL>` — start watching
            - `!BCASTSTOP <Bots>` — stop watching
            - `!BCASTLIST` — list active sessions
          files: ASFBroadcastWatcher.zip
          draft: false
          prerelease: false
